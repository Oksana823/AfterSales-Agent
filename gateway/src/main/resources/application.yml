server:
  port: ${GATEWAY_PORT:18080}

spring:
  application:
    name: aftersales-gateway
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
    gateway:
      server:
        webflux:
          routes:
            - id: aftersales-agent
              uri: ${AGENT_URI:lb://aftersales-agent}
              predicates:
                - Path=/api/agent/**
            - id: aftersales-business
              uri: ${BUSINESS_URI:lb://aftersales-business}
              predicates:
                - Path=/api/business/**
