server:
  port: ${AGENT_WORKER_PORT:8060}

spring:
  config:
    import: optional:nacos:aftersales-agent-worker.yaml
  application:
    name: aftersales-agent-worker
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/aftersales_agent?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}
  sql:
    init:
      mode: always
      schema-locations: classpath:worker-schema.sql
  cloud:
    nacos:
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        file-extension: yaml
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
  ai:
    model:
      chat: ${AI_MODEL:openai}
    openai:
      base-url: ${AI_BASE_URL:https://api.deepseek.com}
      api-key: ${AI_API_KEY:not-configured}
      chat:
        options:
          model: ${AI_CHAT_MODEL:deepseek-v4-flash}
          temperature: ${AI_TEMPERATURE:0.2}

harness:
  llm-enabled: ${AI_ENABLED:true}
