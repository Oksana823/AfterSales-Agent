name: Aftersales

# Docker 仅提供本地基础设施；Java 服务由 IDEA 启动，MySQL 使用宿主机安装。
services:
  redis:
    image: redis:7.4
    container_name: aftersales-redis
    ports: ["6379:6379"]
    volumes: ["./docker-data/redis:/data"]

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: aftersales-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports: ["19200:9200"]
    volumes: ["./docker-data/elasticsearch:/usr/share/elasticsearch/data"]

  nacos:
    image: nacos/nacos-server:v2.4.3
    container_name: aftersales-nacos
    environment:
      MODE: standalone
    ports: ["8848:8848", "9848:9848"]
    volumes: ["./docker-data/nacos:/home/nacos/data"]
