server:
  port: 8050

spring:
  config:
    import: optional:nacos:aftersales-agent.yaml
  application:
    name: aftersales-agent
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/aftersales_agent?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:666666}
  sql:
    init:
      mode: always
      encoding: utf-8
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        file-extension: yaml
  ai:
    model:
      chat: openai
    openai:
      base-url: ${AI_BASE_URL:https://api.deepseek.com}
      api-key: ${AI_API_KEY:not-configured}
      chat:
        options:
          model: ${AI_CHAT_MODEL:deepseek-v4-flash}
          temperature: ${AI_TEMPERATURE:0.2}

harness:
  llm-enabled: ${AI_ENABLED:true}
  business-service-name: ${BUSINESS_SERVICE_NAME:aftersales-business}
  business-mcp-url: ${BUSINESS_MCP_URL:}
  mcp-client-enabled: ${MCP_CLIENT_ENABLED:true}
  mcp-request-timeout-seconds: ${MCP_REQUEST_TIMEOUT_SECONDS:10}
  max-tool-calls: ${AGENT_MAX_TOOL_CALLS:12}
  distributed-agents-enabled: ${DISTRIBUTED_AGENTS_ENABLED:true}
  agent-worker-url: ${AGENT_WORKER_URL:http://aftersales-agent-worker}
